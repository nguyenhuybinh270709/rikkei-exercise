<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 5</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        background-color: #f5f5f5;
      }

      .footer {
        background-color: #223143;
        color: #ffffff;
        padding: 20px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .copyright {
        font-size: 14px;
        opacity: 0.9;
      }

      .social-links {
        display: flex;
        gap: 20px;
      }

      .social-links a {
        color: #ffffff;
        text-decoration: none;
        font-size: 14px;
        font-weight: bold;
      }

      .social-links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <footer class="footer">
      <div class="copyright">
        &copy; 2026 Bản quyền thuộc về Nguyễn Huy Bình.
      </div>
      <div class="social-links">
        <a href="#">Facebook</a>
        <a href="#">Twitter</a>
        <a href="#">LinkedIn</a>
        <a href="#">Instagram</a>
      </div>
    </footer>
  </body>
</html>
