<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 3</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        background-color: #f5f5f5;
        padding: 40px 20px;
      }

      .menu-section {
        max-width: 1200px;
        margin: 0 auto;
      }

      .menu-title {
        text-align: center;
        font-size: 26px;
        font-weight: bold;
        color: #333333;
        margin-bottom: 40px;
      }

      .menu-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
      }

      .menu-card {
        background-color: #ffffff;
        border-radius: 8px;
        overflow: hidden;
        width: 210px;
        display: flex;
        flex-direction: column;
      }

      .menu-image {
        width: 100%;
        height: 160px;
        overflow: hidden;
      }

      .menu-image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .menu-info {
        padding: 15px;
        text-align: center;
        display: flex;
        flex-direction: column;
        justify-content: center;
        flex-grow: 1;
      }

      .food-name {
        font-size: 16px;
        font-weight: bold;
        color: #333333;
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .food-price {
        font-size: 14px;
        color: #dc3545;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="menu-section">
      <h2 class="menu-title">Thực Đơn Của Chúng Tôi</h2>

      <div class="menu-container">
        <div class="menu-card">
          <div class="menu-image">
            <img
              src="https://picsum.photos/id/1080/400/300"
              alt="Salad Rau Củ Tươi"
            />
          </div>
          <div class="menu-info">
            <h3 class="food-name">Salad Rau Củ Tươi</h3>
            <div class="food-price">45.000 VNĐ</div>
          </div>
        </div>

        <div class="menu-card">
          <div class="menu-image">
            <img
              src="https://picsum.photos/id/615/400/300"
              alt="Cơm Gạo Lứt Bổ Dưỡng"
            />
          </div>
          <div class="menu-info">
            <h3 class="food-name">Cơm Gạo Lứt Bổ Dưỡng</h3>
            <div class="food-price">75.000 VNĐ</div>
          </div>
        </div>

        <div class="menu-card">
          <div class="menu-image">
            <img
              src="https://picsum.photos/id/292/400/300"
              alt="Pizza Hải Sản Phô Mai"
            />
          </div>
          <div class="menu-info">
            <h3 class="food-name">Pizza Hải Sản Phô Mai</h3>
            <div class="food-price">120.000 VNĐ</div>
          </div>
        </div>

        <div class="menu-card">
          <div class="menu-image">
            <img
              src="https://picsum.photos/id/1060/400/300"
              alt="Hamburger Bò Úc"
            />
          </div>
          <div class="menu-info">
            <h3 class="food-name">Hamburger Bò Úc</h3>
            <div class="food-price">85.000 VNĐ</div>
          </div>
        </div>

        <div class="menu-card">
          <div class="menu-image">
            <img
              src="https://picsum.photos/id/225/400/300"
              alt="Sườn Nướng BBQ"
            />
          </div>
          <div class="menu-info">
            <h3 class="food-name">Sườn Nướng BBQ</h3>
            <div class="food-price">150.000 VNĐ</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
