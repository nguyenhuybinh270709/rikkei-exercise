<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 4</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        background-color: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .services-section {
        width: 100%;
        max-width: 1000px;
        margin: 0 auto;
      }

      .services-title {
        text-align: center;
        font-size: 26px;
        font-weight: bold;
        color: #333333;
        margin-bottom: 40px;
      }

      .services-container {
        display: flex;
        gap: 20px;
        width: 100%;
      }

      .service-card {
        background-color: #007bff;
        color: #ffffff;
        padding: 40px 20px;
        text-align: center;
        border-radius: 8px;
        font-size: 20px;
        font-weight: bold;
        flex-grow: 1;
        flex-basis: 0;
      }

      @media (max-width: 576px) {
        .services-container {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="services-section">
      <h2 class="services-title">Dịch Vụ Của Chúng Tôi</h2>

      <div class="services-container">
        <div class="service-card">Web Design</div>
        <div class="service-card">SEO</div>
        <div class="service-card">Content</div>
      </div>
    </div>
  </body>
</html>
