<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 1</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: sans-serif;
        background-color: #ffffff;
      }

      .navbar {
        background-color: #223143;
        padding: 15px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .logo {
        color: #ffffff;
        font-size: 24px;
        font-weight: bold;
        text-decoration: none;
      }

      .nav-links {
        display: flex;
        gap: 25px;
        list-style: none;
      }

      .nav-links a {
        color: #ffffff;
        text-decoration: none;
        font-size: 16px;
        opacity: 0.9;
        transition: opacity 0.2s;
      }

      .nav-links a:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <a href="#" class="logo">MyPortfolio</a>
      <ul class="nav-links">
        <li><a href="#">Giới thiệu</a></li>
        <li><a href="#">Kỹ năng</a></li>
        <li><a href="#">Dự án</a></li>
        <li><a href="#">Liên hệ</a></li>
      </ul>
    </nav>
  </body>
</html>
