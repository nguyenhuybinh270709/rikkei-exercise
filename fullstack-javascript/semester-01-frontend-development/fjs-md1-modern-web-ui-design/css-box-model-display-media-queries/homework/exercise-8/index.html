<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 8</title>

    <style>
      body {
        background-color: #f8f9fa;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
      }

      .header {
        background-color: #2c3e50;
        padding: 20px 40px;
      }

      .logo {
        float: left;
        color: #ffffff;
        font-size: 24px;
        font-weight: bold;
        text-decoration: none;
      }

      .nav-menu {
        float: right;
        margin: 0;
        padding: 0;
        list-style: none;
        margin-top: 5px;
      }

      .nav-item {
        display: inline-block;
        margin-left: 25px;
      }

      .nav-link {
        color: #ffffff;
        text-decoration: none;
        font-size: 15px;
      }

      .nav-link:hover {
        color: #3498db;
      }

      .clear {
        clear: both;
      }

      .main-content {
        max-width: 1200px;
        margin: 0 auto;
        padding: 60px 40px;
      }

      .content-title {
        font-size: 28px;
        font-weight: bold;
        color: #1a1a1a;
        margin-top: 0;
        margin-bottom: 20px;
      }

      .content-desc {
        font-size: 16px;
        color: #4a4a4a;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="#" class="logo">TechZone</a>
      <ul class="nav-menu">
        <li class="nav-item"><a href="#" class="nav-link">Trang chủ</a></li>
        <li class="nav-item"><a href="#" class="nav-link">Sản phẩm</a></li>
        <li class="nav-item"><a href="#" class="nav-link">Liên hệ</a></li>
      </ul>
      <div class="clear"></div>
    </div>

    <div class="main-content">
      <h1 class="content-title">Chào mừng bạn đến với TechZone!</h1>
      <p class="content-desc">
        Đây là nội dung trang web không bị tràn lên phần Header phía trên nhờ kỹ
        thuật clear float.
      </p>
    </div>
  </body>
</html>
