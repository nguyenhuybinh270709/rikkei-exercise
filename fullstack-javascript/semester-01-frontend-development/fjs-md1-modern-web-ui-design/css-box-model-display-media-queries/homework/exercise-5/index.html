<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 5</title>

    <style>
      body {
        background-color: #f0f2f5;
        font-family: Arial, sans-serif;
        margin: 0;
        padding-top: 100px;
      }

      .popup {
        background-color: #ffffff;
        width: 600px;
        margin: 0 auto;
        padding: 40px;
        border-radius: 12px;
        text-align: center;
      }

      .popup-title {
        color: #e04f3d;
        font-size: 24px;
        font-weight: bold;
        margin-top: 0;
        margin-bottom: 20px;
      }

      .popup-desc {
        color: #4a4a4a;
        font-size: 15px;
        line-height: 1.6;
        margin-bottom: 30px;
      }

      .form-group {
        display: flex;
        gap: 15px;
        justify-content: center;
      }

      .email-input {
        width: 70%;
        padding: 12px 15px;
        border: 1px solid #cccccc;
        border-radius: 4px;
        font-size: 14px;
      }

      .email-input::placeholder {
        color: #999999;
      }

      .submit-btn {
        background-color: #3498db;
        color: #ffffff;
        border: none;
        padding: 12px 24px;
        font-size: 14px;
        font-weight: bold;
        border-radius: 4px;
        cursor: pointer;
      }

      .submit-btn:hover {
        background-color: #2980b9;
      }
    </style>
  </head>
  <body>
    <div class="popup">
      <h2 class="popup-title">Đăng ký nhận khuyến mãi!</h2>
      <p class="popup-desc">
        Nhập email của bạn để không bỏ lỡ những deal "Siêu Sale Công Nghệ"<br />
        mới nhất từ chúng tôi.
      </p>
      <div class="form-group">
        <input
          type="email"
          class="email-input"
          placeholder="Nhập địa chỉ email..."
        />
        <button type="button" class="submit-btn">Đăng ký ngay</button>
      </div>
    </div>
  </body>
</html>
