<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 3</title>

    <style>
      body {
        background-color: #f5f5f5;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .btn-add-to-cart {
        background-color: #f1c40f;
        color: #000000;
        border: 1px solid #95a5a6;
        padding: 12px 28px;
        font-size: 18px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        display: inline-block;
      }

      .cart-icon {
        width: 24px;
        height: 24px;
        vertical-align: middle;
        margin-right: 10px;
      }

      .btn-text {
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <button class="btn-add-to-cart">
      <img
        class="cart-icon"
        src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><circle cx='9' cy='21' r='1'></circle><circle cx='20' cy='21' r='1'></circle><path d='M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6'></path></svg>"
        alt="Cart"
      />
      <span class="btn-text">Thêm vào giỏ hàng</span>
    </button>
  </body>
</html>
