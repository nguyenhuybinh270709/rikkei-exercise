<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 4</title>

    <style>
      body {
        background-color: #f5f5f5;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 40px;
      }

      .section {
        background-color: #ffffff;
        padding: 30px;
        margin-bottom: 40px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .row {
        font-size: 0;
      }

      .box {
        display: inline-block;
        width: 150px;
        height: 150px;
        border-radius: 12px;
        color: #ffffff;
        font-size: 16px;
        font-weight: bold;
        text-align: center;
        line-height: 150px;
        vertical-align: top;
        margin-right: 15px;
      }

      .box-1,
      .box-4 {
        background-color: #2ecc71;
      }

      .box-2 {
        background-color: #e74c3c;
        display: none;
      }

      .box-3,
      .box-6 {
        background-color: #9b59b6;
      }

      .box-5 {
        background-color: #3498db;
        visibility: hidden;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <div class="row">
        <div class="box box-1">Sản phẩm 1</div>
        <div class="box box-2">Sản phẩm 2</div>
        <div class="box box-3">Sản phẩm 3</div>
      </div>
    </div>

    <div class="section">
      <div class="row">
        <div class="box box-4">Sản phẩm 4</div>
        <div class="box box-5">Sản phẩm 5</div>
        <div class="box box-6">Sản phẩm 6</div>
      </div>
    </div>
  </body>
</html>
