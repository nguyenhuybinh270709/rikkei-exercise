<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 2</title>

    <style>
      body {
        background-color: #f5f5f5;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 50px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .product-card {
        background-color: #ffffff;
        width: 450px;
        padding: 30px;
        border: 2px solid #3498db;
        border-radius: 12px;
        box-sizing: border-box;
        margin: 20px;
      }

      .product-title {
        color: #2c3e50;
        font-size: 22px;
        font-weight: bold;
        margin-top: 0;
        margin-bottom: 20px;
      }

      .product-desc {
        color: #555555;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 25px;
      }

      .product-price {
        color: #e74c3c;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="product-card">
      <h2 class="product-title">Điện Thoại Thông Minh X</h2>
      <p class="product-desc">
        Màn hình 6.5 inch, camera sắc nét, pin dung lượng cao phù hợp cho cả
        ngày dài.
      </p>
      <div class="product-price">Giá: 15.000.000 VNĐ</div>
    </div>
  </body>
</html>
