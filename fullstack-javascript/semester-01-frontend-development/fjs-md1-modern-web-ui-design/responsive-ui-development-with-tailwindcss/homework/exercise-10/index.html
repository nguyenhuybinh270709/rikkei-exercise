<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Exercise 10</title>
  </head>
  <body class="bg-slate-50 min-h-screen flex text-slate-800">
    <aside
      class="hidden md:flex flex-col w-64 bg-[#111827] text-slate-300 shrink-0"
    >
      <div class="h-16 flex items-center px-6 border-b border-slate-800">
        <h1 class="text-lg font-bold text-white tracking-wide">
          TechGadget Admin
        </h1>
      </div>
      <nav class="flex-1 p-4 space-y-1">
        <a
          href="#"
          class="flex items-center px-4 py-3 bg-[#1d5bf0] text-white font-medium rounded-xl transition-colors"
        >
          Tổng quan
        </a>
        <a
          href="#"
          class="flex items-center px-4 py-3 hover:bg-slate-800 hover:text-white font-medium rounded-xl transition-colors"
        >
          Đơn hàng
        </a>
        <a
          href="#"
          class="flex items-center px-4 py-3 hover:bg-slate-800 hover:text-white font-medium rounded-xl transition-colors"
        >
          Sản phẩm
        </a>
        <a
          href="#"
          class="flex items-center px-4 py-3 hover:bg-slate-800 hover:text-white font-medium rounded-xl transition-colors"
        >
          Khách hàng
        </a>
      </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
      <header
        class="h-16 bg-white border-b border-slate-100 flex items-center px-4 md:px-8 shrink-0"
      >
        <div class="w-full max-w-md">
          <input
            type="text"
            placeholder="Tìm kiếm mã đơn hàng, sản phẩm..."
            class="w-full px-4 py-2 bg-slate-50 border border-slate-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 focus:bg-white transition-colors"
          />
        </div>
      </header>

      <main class="flex-1 p-4 md:p-8 overflow-y-auto">
        <h2 class="text-xl md:text-2xl font-bold text-slate-900 mb-6 md:mb-8">
          Tổng quan hệ thống
        </h2>

        <div
          class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6"
        >
          <div
            class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100 flex flex-col gap-2"
          >
            <span
              class="text-xs font-semibold text-slate-400 uppercase tracking-wider"
              >Tổng doanh thu</span
            >
            <span class="text-xl md:text-2xl font-extrabold text-slate-900"
              >125.000.000 đ</span
            >
          </div>

          <div
            class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100 flex flex-col gap-2"
          >
            <span
              class="text-xs font-semibold text-slate-400 uppercase tracking-wider"
              >Đơn hàng mới</span
            >
            <span class="text-xl md:text-2xl font-extrabold text-slate-900"
              >342</span
            >
          </div>

          <div
            class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100 flex flex-col gap-2"
          >
            <span
              class="text-xs font-semibold text-slate-400 uppercase tracking-wider"
              >Khách hàng truy cập</span
            >
            <span class="text-xl md:text-2xl font-extrabold text-slate-900"
              >1,204</span
            >
          </div>

          <div
            class="bg-white p-6 rounded-2xl shadow-xs border border-slate-100 flex flex-col gap-2"
          >
            <span
              class="text-xs font-semibold text-slate-400 uppercase tracking-wider"
              >Tỉ lệ chuyển đổi</span
            >
            <span class="text-xl md:text-2xl font-extrabold text-slate-900"
              >4.5%</span
            >
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
