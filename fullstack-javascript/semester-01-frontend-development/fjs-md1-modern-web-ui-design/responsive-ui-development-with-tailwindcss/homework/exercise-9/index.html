<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Exercise 9</title>
  </head>
  <body
    class="bg-slate-50 min-h-screen flex items-center justify-center p-4 md:p-8"
  >
    <div class="max-w-6xl w-full mx-auto">
      <h2
        class="text-2xl md:text-3xl font-bold text-center text-slate-800 mb-8 md:mb-12"
      >
        Dịch Vụ Đi Kèm
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
        <div
          class="bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow p-6 flex flex-col items-start border border-slate-100"
        >
          <div
            class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4 shrink-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
              <polyline points="9 22 9 12 15 12 15 22" />
            </svg>
          </div>
          <h3 class="font-bold text-slate-800 text-lg mb-2">Khách Sạn</h3>
          <p class="text-sm text-slate-500 leading-relaxed">
            Hệ thống khách sạn chuẩn quốc tế cao cấp và tiện nghi.
          </p>
        </div>

        <div
          class="bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow p-6 flex flex-col items-start border border-slate-100"
        >
          <div
            class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4 shrink-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3.5c-.5-.5-2.5 0-4 1.5L13.5 8 5.3 6.2c-.5-.1-1.1.1-1.4.5l-.3.4c-.2.3-.2.7 0 1l7.4 4.5-3.3 3.3-3.1-1c-.3-.1-.7-.1-1 .1L3 15.2l3.4 1.4L7.8 20l.8-.6c.2-.2.3-.5.2-.8l-1-3.1 3.3-3.3 4.5 7.4c.3.2.7.2 1 0l.4-.3c.4-.3.6-.9.5-1.4z"
              />
            </svg>
          </div>
          <h3 class="font-bold text-slate-800 text-lg mb-2">Vé Máy Bay</h3>
          <p class="text-sm text-slate-500 leading-relaxed">
            Đối tác từ các hãng hàng không hàng đầu thế giới.
          </p>
        </div>

        <div
          class="bg-white rounded-2xl shadow-md p-6 flex flex-col items-start border border-blue-100 relative ring-2 ring-blue-500/10"
        >
          <div
            class="w-12 h-12 bg-blue-600 text-white rounded-xl flex items-center justify-center mb-4 shrink-0 shadow-sm shadow-blue-500/20"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M20 13c0 5-3.5 7.5-7.66 9.7a1 1 0 0 1-.68 0C7.5 20.5 4 18 4 13V6a1 1 0 0 1 .76-.97l8-2a1 1 0 0 1 .48 0l8 2A1 1 0 0 1 20 6z"
              />
              <path d="m9 12 2 2 4-4" />
            </svg>
          </div>
          <h3 class="font-bold text-slate-800 text-lg mb-2">Bảo Hiểm</h3>
          <p class="text-sm text-slate-500 leading-relaxed">
            Đảm bảo an toàn 100% trong mọi tình huống khẩn cấp.
          </p>
        </div>

        <div
          class="bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow p-6 flex flex-col items-start border border-slate-100"
        >
          <div
            class="w-12 h-12 bg-blue-50 text-blue-600 rounded-xl flex items-center justify-center mb-4 shrink-0"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M22 21v-2a4 4 0 0 0-3-3.87" />
              <path d="M16 3.13a4 4 0 0 1 0 7.75" />
            </svg>
          </div>
          <h3 class="font-bold text-slate-800 text-lg mb-2">Hướng Dẫn</h3>
          <p class="text-sm text-slate-500 leading-relaxed">
            Đội ngũ hướng dẫn viên người bản địa giàu kinh nghiệm.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
