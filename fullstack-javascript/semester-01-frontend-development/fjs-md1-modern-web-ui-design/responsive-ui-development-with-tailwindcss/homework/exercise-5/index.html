<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Exercise 5</title>
  </head>
  <body class="bg-slate-50 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-6xl w-full mx-auto">
      <h2 class="text-2xl font-bold text-center text-slate-800 mb-8">
        Các Tour Nổi Bật
      </h2>

      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div
          class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-100 flex flex-col items-center pb-6 text-center"
        >
          <img
            src="https://images.unsplash.com/photo-1508009603885-50cf7c579365?q=80&w=600&auto=format&fit=crop"
            alt="Thái Lan"
            class="w-full h-48 object-cover mb-4"
          />
          <h3 class="font-bold text-lg text-slate-800 px-4">Thái Lan</h3>
          <p class="text-sm text-slate-500 mt-1 px-4">Xứ sở chùa vàng</p>
        </div>

        <div
          class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-100 flex flex-col items-center pb-6 text-center"
        >
          <img
            src="https://images.unsplash.com/photo-1503899036084-c55cdd92da26?q=80&w=600&auto=format&fit=crop"
            alt="Nhật Bản"
            class="w-full h-48 object-cover mb-4"
          />
          <h3 class="font-bold text-lg text-slate-800 px-4">Nhật Bản</h3>
          <p class="text-sm text-slate-500 mt-1 px-4">Hoa anh đào rực rỡ</p>
        </div>

        <div
          class="bg-white rounded-xl shadow-md overflow-hidden border border-slate-100 flex flex-col items-center pb-6 text-center"
        >
          <img
            src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?q=80&w=600&auto=format&fit=crop"
            alt="Pháp"
            class="w-full h-48 object-cover mb-4"
          />
          <h3 class="font-bold text-lg text-slate-800 px-4">Pháp</h3>
          <p class="text-sm text-slate-500 mt-1 px-4">Kinh đô ánh sáng</p>
        </div>
      </div>
    </div>
  </body>
</html>
