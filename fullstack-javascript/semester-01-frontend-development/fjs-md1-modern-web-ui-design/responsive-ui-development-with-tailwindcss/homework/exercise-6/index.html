<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Exercise 6</title>
  </head>
  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div
      class="bg-white p-6 md:p-8 rounded-xl shadow-md w-full max-w-4xl border border-slate-100"
    >
      <form class="grid grid-cols-1 md:grid-cols-12 gap-5 items-end">
        <div class="md:col-span-5 flex flex-col gap-2">
          <label class="font-bold text-slate-700 text-sm md:text-base"
            >Điểm đến</label
          >
          <input
            type="text"
            placeholder="Bạn muốn đi đâu?"
            class="w-full px-4 py-3 border border-slate-200 rounded-lg text-slate-700 placeholder-slate-400 focus:outline-none focus:border-blue-500 text-sm md:text-base"
          />
        </div>

        <div class="md:col-span-4 flex flex-col gap-2">
          <label class="font-bold text-slate-700 text-sm md:text-base"
            >Ngày đi</label
          >
          <input
            type="date"
            class="w-full px-4 py-3 border border-slate-200 rounded-lg text-slate-700 focus:outline-none focus:border-blue-500 text-sm md:text-base"
          />
        </div>

        <div class="md:col-span-3">
          <button
            type="submit"
            class="w-full bg-[#1d5bf0] hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition-colors cursor-pointer text-sm md:text-base"
          >
            Tìm kiếm
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
