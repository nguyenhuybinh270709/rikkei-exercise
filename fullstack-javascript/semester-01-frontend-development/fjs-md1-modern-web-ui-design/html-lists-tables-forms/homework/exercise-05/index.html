<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 5</title>
  </head>
  <body>
    <h2>Khảo sát dịch vụ khách hàng</h2>

    <form action="#" method="POST">
      <div>
        <label for="age">Độ tuổi của bạn:</label>
        <input type="number" id="age" />
      </div>

      <fieldset>
        <legend>Giới tính của bạn là gì?</legend>
        <label> <input type="radio" name="gender" value="nam" /> Nam </label>
        <label> <input type="radio" name="gender" value="nu" /> Nữ </label>
        <label>
          <input type="radio" name="gender" value="khac" checked /> Khác
        </label>
      </fieldset>

      <fieldset>
        <legend>Dịch vụ bạn đang quan tâm (có thể chọn nhiều):</legend>
        <label>
          <input type="checkbox" name="services" value="website" checked />
          Website
        </label>
        <label>
          <input type="checkbox" name="services" value="mobile_app" /> Mobile
          App
        </label>
        <label>
          <input type="checkbox" name="services" value="marketing" /> Marketing
        </label>
      </fieldset>

      <div>
        <label for="country">Quốc gia đang sinh sống:</label>
        <select id="country" name="country">
          <option value="">-- Vui lòng chọn --</option>
          <option value="vietnam">Việt Nam</option>
          <option value="japan">Nhật Bản</option>
          <option value="united-state">Hoa Kỳ</option>
        </select>
      </div>

      <div>
        <button type="submit">Gửi thông tin</button>
      </div>
    </form>
  </body>
</html>
