<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 9</title>
  </head>
  <body>
    <h2>Nộp hồ sơ ứng tuyển</h2>

    <form action="#" method="POST" enctype="multipart/form-data">
      <fieldset>
        <legend>Thông tin liên hệ</legend>

        <div>
          <label for="fullname">Họ và tên:</label>
          <input type="text" id="fullname" name="fullname" />
        </div>
        <br />

        <div>
          <label for="phone">Số điện thoại:</label>
          <input
            type="tel"
            id="phone"
            name="phone"
            placeholder="0912345678"
            pattern="^0[1-9][0-9]{8}$"
            title="Số điện thoại phải bắt đầu bằng số 0, chữ số thứ hai từ 1-9 và có tổng cộng đúng 10 chữ số."
          />
        </div>
      </fieldset>
      <br />

      <fieldset>
        <legend>Hồ sơ đính kèm</legend>

        <div>
          <label for="cv-file">Tải lên CV (Định dạng PDF/Word):</label>
          <input
            type="file"
            id="cv-file"
            name="cv_file"
            accept=".pdf,.doc,.docx"
          />
        </div>
      </fieldset>
      <br />

      <div>
        <button type="submit">Nộp hồ sơ</button>
      </div>
    </form>
  </body>
</html>
