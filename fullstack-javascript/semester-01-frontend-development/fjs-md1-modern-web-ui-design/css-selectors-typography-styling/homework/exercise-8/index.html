<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 8</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #f8fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .container {
        background: #ffffff;
        width: 100%;
        max-width: 650px;
        padding: 40px 50px 60px 50px;
        border-left: 5px solid #2980b9;
        position: relative;
      }
      .text {
        color: #333333;
        font-size: 18px;
        line-height: 1.8;
        font-style: italic;
      }
      .text::first-letter {
        font-size: 45px;
        font-weight: bold;
        color: #2980b9;
        float: left;
        margin-right: 8px;
        line-height: 1;
      }
      .text::before {
        content: "“";
        font-size: 30px;
        color: #bdc3c7;
        font-weight: bold;
        position: absolute;
        left: 30px;
        top: 20px;
      }
      .text::after {
        content: "”";
        font-size: 30px;
        color: #bdc3c7;
        font-weight: bold;
        position: absolute;
        right: 40px;
        bottom: 90px;
      }
      .author {
        text-align: right;
        margin-top: 30px;
        color: #666666;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <p class="text">
        Đột phá không đến từ việc cố gắng tạo ra thứ gì đó lớn lao, mà từ việc
        liên tục giải quyết các vấn đề nhỏ nhặt xung quanh cuộc sống của bạn.
        Khi bạn tập trung xây dựng sản phẩm mang lại giá trị thực sự cho người
        dùng, những điều vĩ đại sẽ tự nhiên theo sau.
      </p>
      <div class="author">- Tỷ phú công nghệ -</div>
    </div>
  </body>
</html>
