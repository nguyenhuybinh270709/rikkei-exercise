<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 5</title>

    <style>
      .card {
        width: 300px;
        border: 1px solid gray;
        padding: 15px;
        text-align: center;
        border-radius: 8px;
      }

      .card img {
        width: 100%;
        height: auto;
      }

      .title {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 8px;
      }

      .price {
        color: #ff4d4d;
        font-weight: bold;
        font-size: 18px;
        margin-bottom: 15px;
        font-weight: 600;
      }

      .btn {
        background-color: rgb(36, 225, 115);
        color: white;
        border: none;
        padding: 10px 30px;
        font-size: 16px;
        border-radius: 4px;
        cursor: pointer;
      }

      .btn:hover {
        background-color: rgba(36, 225, 115, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="./images//shoes.png" alt="Giày thể thao" />

      <div class="title">Giày Thể Thao Siêu Nhẹ</div>
      <div class="price">1.250.000 VNĐ</div>
      <button class="btn">Mua ngay</button>
    </div>
  </body>
</html>
