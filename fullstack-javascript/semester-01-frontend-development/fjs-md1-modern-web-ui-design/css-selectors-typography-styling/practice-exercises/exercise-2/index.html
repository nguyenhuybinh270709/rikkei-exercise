<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 2</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background-color: #f8fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }
      .card {
        background: #ffffff;
        width: 100%;
        max-width: 550px;
        padding: 2.5rem;
        border: 1px solid #e2e8f0;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
      }
      .name {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 2rem;
        font-weight: 900;
        color: #000000;
        margin-bottom: 1rem;
      }
      .job {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 1.3rem;
        font-weight: bold;
        color: #555555;
        margin-bottom: 1.2rem;
      }
      .desc {
        font-family: "Helvetica Neue", Arial, sans-serif;
        font-size: 1.05rem;
        color: #333333;
        line-height: 1.5;
        text-align: justify;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 class="name">Vũ Văn A</h2>
      <div class="job">Lập trình viên Fullstack</div>
      <p class="desc">
        Chào mừng bạn đến với blog của mình. Đây là nơi mình chia sẻ những kiến
        thức về HTML, CSS và các công nghệ lập trình hiện đại để cùng nhau phát
        triển trong hành trình trở thành lập trình viên chuyên nghiệp.
      </p>
    </div>
  </body>
</html>
