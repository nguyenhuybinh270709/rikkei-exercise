<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 3</title>

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: Arial, sans-serif;
      }
      .section {
        width: 100%;
        height: 450px;
        background:
          linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
          url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=1200")
            no-repeat center center;
        background-size: cover;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 20px;
      }
      .title {
        color: #ffffff;
        font-size: 42px;
        font-weight: bold;
        margin-bottom: 20px;
        max-width: 600px;
        line-height: 1.3;
      }
      .desc {
        color: rgba(255, 255, 255, 0.9);
        font-size: 16px;
        max-width: 700px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="section">
      <h1 class="title">Khám Phá Vẻ Đẹp Thiên Nhiên</h1>
      <p class="desc">
        Đắm mình vào những cảnh quan hùng vĩ, tận hưởng không khí trong lành và
        tạo nên những kỷ niệm khó quên tại những điểm đến tuyệt vời nhất.
      </p>
    </div>
  </body>
</html>
