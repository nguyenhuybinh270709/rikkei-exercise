<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 7</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light py-5">
    <div class="container">
      <h2 class="text-center fw-bold mb-4">
        Danh Sách Sách Kèm Trạng Thái Xóa
      </h2>

      <div class="table-responsive shadow-sm rounded-3">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th scope="col" class="py-3 px-4" style="width: 10%">ID</th>
              <th scope="col" class="py-3" style="width: 45%">Tên Sách</th>
              <th scope="col" class="py-3" style="width: 30%">Tác Giả</th>
              <th scope="col" class="py-3 text-center" style="width: 15%">
                Thao tác
              </th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th scope="row" class="px-4 fw-bold">1</th>
              <td>Hành Trình Về Phương Đông</td>
              <td>Baird T. Spalding</td>
              <td class="text-center">
                <button
                  type="button"
                  class="btn btn-danger btn-sm px-3"
                  data-bs-toggle="modal"
                  data-bs-target="#deleteModal"
                >
                  Xóa
                </button>
              </td>
            </tr>
            <tr>
              <th scope="row" class="px-4 fw-bold">2</th>
              <td>Đắc Nhân Tâm</td>
              <td>Dale Carnegie</td>
              <td class="text-center">
                <button
                  type="button"
                  class="btn btn-danger btn-sm px-3"
                  data-bs-toggle="modal"
                  data-bs-target="#deleteModal"
                >
                  Xóa
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <div
      class="modal fade"
      id="deleteModal"
      tabindex="-1"
      aria-labelledby="deleteModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow rounded-3">
          <div class="modal-header border-bottom-0 pt-4 px-4">
            <h5 class="modal-title fw-bold text-danger" id="deleteModalLabel">
              Xác nhận xóa
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body px-4 py-3 text-secondary">
            Bạn có chắc chắn muốn xóa cuốn sách này không? Hành động này không
            thể hoàn tác.
          </div>
          <div
            class="modal-footer border-top-0 pb-4 px-4 justify-content-end gap-2"
          >
            <button
              type="button"
              class="btn btn-secondary px-4"
              data-bs-dismiss="modal"
            >
              Hủy
            </button>
            <button type="button" class="btn btn-danger px-4">Xác nhận</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
