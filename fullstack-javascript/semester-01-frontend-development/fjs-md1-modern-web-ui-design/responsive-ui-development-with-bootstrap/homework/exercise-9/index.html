<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 9</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --bs-primary: #9b1c2e;
        --bs-primary-rgb: 155, 28, 46;
        --bs-primary-bg-subtle: #fbebee;
        --bs-primary-border-subtle: #f4d2d7;
        --bs-primary-text-emphasis: #5d111b;

        --bs-secondary: #212529;
        --bs-secondary-rgb: 33, 37, 41;
      }

      .btn-primary {
        --bs-btn-bg: var(--bs-primary);
        --bs-btn-border-color: var(--bs-primary);
        --bs-btn-hover-bg: #801423;
        --bs-btn-hover-border-color: #74121f;
        --bs-btn-active-bg: #74121f;
        --bs-btn-active-border-color: #67101c;
        --bs-btn-disabled-bg: var(--bs-primary);
        --bs-btn-disabled-border-color: var(--bs-primary);
      }

      .btn-outline-secondary {
        --bs-btn-color: var(--bs-secondary);
        --bs-btn-border-color: #ced4da;
        --bs-btn-hover-bg: var(--bs-secondary);
        --bs-btn-hover-border-color: var(--bs-secondary);
        --bs-btn-active-bg: var(--bs-secondary);
        --bs-btn-active-border-color: var(--bs-secondary);
      }

      .custom-card {
        border-top: 5px solid var(--bs-primary) !important;
      }
    </style>
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center min-vh-100 p-3"
  >
    <div
      class="card custom-card overflow-hidden shadow-sm border-0 rounded-4"
      style="max-width: 900px; width: 100%"
    >
      <div class="row g-0">
        <div
          class="col-md-5 col-12 position-relative d-none d-md-block"
          style="min-height: 350px"
        >
          <img
            src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=800"
            class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover"
            alt="Tech Talk Event"
          />
        </div>
        <div class="col-12 d-md-none">
          <img
            src="https://images.unsplash.com/photo-1540575467063-178a50c2df87?q=80&w=800"
            class="w-100 object-fit-cover"
            style="height: 200px"
            alt="Tech Talk Event"
          />
        </div>

        <div
          class="col-md-7 col-12 d-flex flex-column justify-content-center p-4 p-lg-5"
        >
          <h1
            class="fw-bold h3 mb-3"
            style="color: var(--bs-primary); line-height: 1.3"
          >
            Tech Talk: Tương Lai Lập Trình AI
          </h1>

          <p class="text-muted small mb-4 lh-base">
            Tham gia cùng Rikkei Academy để khám phá những xu hướng công nghệ AI
            mới nhất và cách ứng dụng vào phát triển phần mềm trong tương lai.
          </p>

          <div class="mb-4">
            <div class="d-flex align-items-center mb-2">
              <span class="fw-bold text-dark me-2 small" style="min-width: 80px"
                >Thời gian:</span
              >
              <span class="text-secondary small"
                >09:00 - 12:00, 25/11/2026</span
              >
            </div>
            <div class="d-flex align-items-center">
              <span class="fw-bold text-dark me-2 small" style="min-width: 80px"
                >Địa điểm:</span
              >
              <span class="text-secondary small">Cơ sở Rikkei Academy HN</span>
            </div>
          </div>

          <div class="d-flex flex-wrap gap-3">
            <button class="btn btn-primary px-4 py-2 fw-medium rounded-2 small">
              Đăng Ký Ngay
            </button>
            <button
              class="btn btn-outline-secondary px-4 py-2 fw-medium rounded-2 small"
            >
              Xem Chi Tiết
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
