<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 5</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center min-vh-100"
  >
    <div
      class="card p-5 shadow-sm border-0 rounded-3"
      style="width: 100%; max-width: 550px"
    >
      <h2 class="text-center fw-bold mb-4">Thêm Sách Mới</h2>
      <form>
        <div class="mb-4">
          <label for="bookName" class="form-label fw-bold small"
            >Tên sách</label
          >
          <input
            type="text"
            class="form-control form-control-lg fs-6 rounded-3"
            id="bookName"
            placeholder="Nhập tên sách..."
          />
        </div>
        <div class="mb-4">
          <label for="author" class="form-label fw-bold small">Tác giả</label>
          <input
            type="text"
            class="form-control form-control-lg fs-6 rounded-3"
            id="author"
            placeholder="Nhập tên tác giả..."
          />
        </div>
        <div class="mb-5">
          <label for="category" class="form-label fw-bold small"
            >Thể loại</label
          >
          <select
            class="form-select form-select-lg fs-6 rounded-3 text-muted"
            id="category"
          >
            <option selected disabled hidden>Chọn thể loại...</option>
            <option value="1">Tiểu thuyết</option>
            <option value="2">Khoa học</option>
            <option value="3">Kinh tế</option>
          </select>
        </div>
        <button
          type="submit"
          class="btn btn-primary btn-lg w-100 fw-medium py-3 rounded-3 fs-6"
        >
          Thêm sách
        </button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
